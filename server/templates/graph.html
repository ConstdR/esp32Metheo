<!doctype html>
<html lang="en">
<head>
<title>{{name}} weather / {{id}}</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta http-equiv="refresh" content="{{refreshtime}}">
<meta http-equiv="expires" content="{{refreshtime * 2}}">
<script src="/static/dygraph.js"></script>
<script src="/static/jquery.min.js"></script>
<script src="/static/moment.min.js"></script>
<script src="/static/daterangepicker.min.js"></script>
<link rel="stylesheet" href="/static/dygraph.css">
<link rel="stylesheet" href="/static/daterangepicker.css">
<style>
  .namedate{width:30em;height:1em;margin:4px;float:left;font-size:30px;font-weight:bold;text-align:center}
  .box{width:8em;height:1em;margin:4px;border:1px solid black;float:left;font-size:40px;font-weight:bold;text-align:center;padding:.2em;color:white}
  .temp{background:#25259a} .hum{background:#3d9e3d} .pres{background:#800080} .volt{background:#008080}
  .leftname{width:1em;float:left;font-size:40px;font-weight:bold;text-align:center;padding:3em 0}
  .graph{float:left;width:1000px;height:300px}
  .message{font-size:15px;font-style:italic;font-family:arial}
  .cf{clear:both}
  input[type=text],input[type=submit]{font-size:20px;font-weight:bold}
</style>
</head>
<body>
<div>
  <div style="float:left"><a href="/">Home</a></div>
  <form method="GET">
  <div class="namedate"><i>
    <span id="espwname" onclick="startRename()">{{name}}</span>
    <span id="espwrename" style="display:none">
      <input type=text name="rename" value="{{name}}">
      <input type="submit" value="ok">
    </span>
  </form>
  / {{tztime}}</i></div>
  <div class="cf"></div>
  <div class="box temp">{{temperature}} °C</div>
  <div class="box hum">{{humidity}} %</div>
  <div class="cf"></div>
  {% if pressure %}<div class="box pres">{{pressure}} hPa</div>{% endif %}
  <div class="box volt">{{v}}V{% if mvs %} / {{vs}} V<sub>sun</sub>{% endif %}</div>
  <div class="cf"></div>
</div>
<div>
  <div style="text-align:center;width:1000px">
    <div id="countdown" style="float:left">{{refreshtime}}</div>
    <form id="rangeform" method="GET">
      <input type="text" id="dates" name="daterange" value="{{startdate}} - {{enddate}}">
    </form>
  </div>
  <div class="leftname">°C</div><div id="temperature" class="graph"></div><div class="cf"></div>
  {% if pressure %}
  <div class="leftname">hPa</div><div id="pressure" class="graph"></div><div class="cf"></div>
  {% endif %}
  <div class="leftname">%</div><div id="humidity" class="graph"></div><div class="cf"></div>
  <div class="leftname">V</div><div id="battery" class="graph"></div><div class="cf"></div>
  {% if mvs %}
  <div class="leftname">V<sub>sun</sub></div><div id="solar" class="graph"></div>
  {% endif %}
  <div class="cf"></div>
</div>
<script>
  $('#dates').daterangepicker({
    autoApply:true, opens:'center',
    locale:{format:'YYYY-MM-DD'},
    startDate:'{{startdate}}', endDate:'{{enddate}}',
    ranges:{
      'Today':[moment(),moment()],
      'Yesterday':[moment().subtract(1,'days'),moment().subtract(1,'days')],
      'Last 7 Days':[moment().subtract(6,'days'),moment()],
      'Last 30 Days':[moment().subtract(29,'days'),moment()],
      'This Month':[moment().startOf('month'),moment().endOf('month')],
      'Last Month':[moment().subtract(1,'month').startOf('month'),moment().subtract(1,'month').endOf('month')]
    }
  });
  $('input[name="daterange"]').on('apply.daterangepicker', function(){ $('#rangeform').submit() });

  var req = new XMLHttpRequest();
  req.open("GET", "/csv/{{id}}?daterange={{startdate}} - {{enddate}}", false);
  req.onreadystatechange = function(){ csv = req.responseText; }
  req.send();

  var labels = ['Time','Temperature','Humidity','Pressure','Battery','Solar'];
  function dg(id, col, vis) {
    return new Dygraph(document.getElementById(id), csv,
      {labels:labels, visibility:vis, rollPeriod:4, showRoller:true, color:col});
  }
  var gt = dg("temperature", "#25259a", [true, false,false,false,false]);
  var g1 = dg("humidity",    "#3d9e3d", [false,true, false,false,false]);
  {% if pressure %}
  var g2 = dg("pressure",    "#800080", [false,false,true, false,false]);
  {% endif %}
  var g3 = dg("battery",     "#008080", [false,false,false,true, false]);
  {% if mvs %}
  var g4 = dg("solar",       "#8080f0", [false,false,false,false,true ]);
  {% endif %}

  function startRename() {
    document.getElementById("espwname").style.display   = "none";
    document.getElementById("espwrename").style.display = "inline";
  }
  setInterval(function(){ var s=$("#countdown"); s.text(s.text()-1) }, 1000);
</script>
<hr>
<h2><i>IP: {{ip}}</i></h2>
{% if message %}<span class=message>Message: {{message}}</span>{% endif %}
</body>
</html>
