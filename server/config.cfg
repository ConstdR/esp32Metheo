[default]
debug = INFO
host= 0.0.0.0
port = 8088
dbdir = ./

[listener]
debug = DEBUG
dbdir = ./

[thresholds]
# Default date range for graph (days)
default_range_days = 7
# Window for max voltage calculation (used to normalize MicroPython raw ADC)
volt_max_window_days = 60
# Nominal max voltages (for MicroPython normalization)
nominal_battery_v = 4.2
nominal_solar_v = 6.0

# Color thresholds for current readings
temp_cold = 0
temp_hot = 25
hum_dry_low = 20
hum_ok_low = 40
hum_ok_high = 60
hum_wet_high = 80
bat_ok = 3.8
bat_warn = 3.5

# Forecast thresholds (hPa/hour over 6h window)
forecast_storm = -1.0
forecast_rain_hum_diff = 5
forecast_worsening = -0.3
forecast_improving = 0.2
forecast_clear = 0.5

# Local barometric reference (sea level 1013 - elevation correction)
# Prague at 345m elevation: 1013 - 345*12/100 ≈ 972
pressure_normal = 972

# Graph reference lines
graph_temp_low = 0
graph_temp_high = 20
graph_humidity_normal = 50
